<!DOCTYPE html>
<html>
<head>
    <title>Clinic System</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f6fa;
        }

        .navbar {
            background: #2c3e50;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        a {
            text-decoration: none;
            color: #2980b9;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div>🏥 Clinic System</div>
    <div>
        {{ request.user.username }} |
        <a href="/logout/" style="color:white;">Logout</a>
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
